<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">
    <head>
        <link rel="icon" href="/img/aesosat_logo_whitebg.png">
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/data.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
        <title>AesoSAT - Dades</title>
        <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    </head>
    <body>
        <div class="app" id="main">
            <div class="list">
                <div class="header_container">
                    <h2 class="title">LLANÇAMENTS</h2>
                    <button class="close">&#215;</button>
                </div>
                <div class="list_container">
                    <div class="top">
                        <div class="blank"></div>
                        <div class="name">
                            <h3>Nom</h3>
                        </div>
                        <div class="location">
                            <h3>Localització</h3>
                        </div>
                        <div class="date">
                            <h3>Data</h3>
                        </div>
                        <div class="hour">
                            <h3>Hora d'inici</h3>
                        </div>
                        <div class="time">
                            <h3>Temps de durada</h3>
                        </div>
                        <div class="status">
                            <h3>Estat</h3>
                        </div>
                        <div class="filter">
                            <h3 class="filter_text">Filtrar</h3>
                        </div>
                    </div>
                    <div class="content">
                        <div class="data">
                            <div class="data_logo">
                                <img src="/img/aesosat_logo_whitebg.png" alt="" class="data_logo_img">
                            </div>
                            <div class="data_name">
                                <h3>Prova 1</h3>
                            </div>
                            <div class="data_location">
                                <h3>Isona i Conca dellà, Catalunya, Espanya</h3>
                            </div>
                            <div class="data_date">
                                <h3>Feb 2, 2026</h3>
                            </div>
                            <div class="data_hour">
                                <h3>11:37</h3>
                            </div>
                            <div class="data_time">
                                <h3>10min 34sec</h3>
                            </div>
                            <div class="data_status">
                                <h3>En directe</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="overlay">
                <div class="filter">
                    
                </div>
            </div>
        </div>
        <script src="/js/scale.js"></script>
    </body>
</html>
