<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pàgina en construcció</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                user-select: none;
                font-family: sans-serif;
            }
            .overlay {
                background: rgba(0,0,0,.75);
                position: fixed;
                height: 100vh;
                width: 100vw;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .popup {
                background: #ffa400;
                padding: 20px;
                height: 200px;
                width: auto;
                border-radius: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 15px;
            }
            .title {
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div class="overlay">
            <div class="popup">
                <h2 class="title">Disculpeu les molèsties, però aquesta pàgina està actualment en construcció</h2>
                <h3 class="subtitle">Si desitjeu contactar-nos, envieu-nos un correu a <a href="mailto:aeso.iestremp@gmail.com">aeso.iestremp@gmail.com</a> i seguiu-nos al nostre instagram <a href="https://instagram.com/aeso_sat">@aeso_sat</a></h3>
            </div>
        </div>
    </body>
</html>
